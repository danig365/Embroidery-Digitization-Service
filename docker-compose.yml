version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: embroidery_db
    environment:
      POSTGRES_DB: ${DB_NAME:-embroidery_db}
      POSTGRES_USER: ${DB_USER:-embroidery_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-embroidery_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: embroidery_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-embroidery_db}
      DB_USER: ${DB_USER:-embroidery_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    volumes:
      - ./backend/media:/app/backend/media
      - ./backend/staticfiles:/app/backend/staticfiles
    ports:
      - "8000:8000"
    command: sh -c "python manage.py migrate && gunicorn studio.wsgi --bind 0.0.0.0:8000 --workers 4"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: embroidery_frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000/api}
      REACT_APP_STRIPE_PUBLISHABLE_KEY: ${REACT_APP_STRIPE_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: embroidery_nginx
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/staticfiles:/app/backend/staticfiles:ro
      - ./backend/media:/app/backend/media:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: embroidery_network
